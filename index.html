<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fine · Lot Registry — Provnr</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  /* Provnr brand tokens */
  --mint:    #90EE82;
  --mint-dim: #6abf5e;
  --mint-glow: rgba(144,238,130,0.12);
  --mint-glow2: rgba(144,238,130,0.06);
  --orange:  #F5921E;
  --olive:   #5B7A3D;
  --black:   #000000;
  --surface: #0f0f0f;
  --surface2: #161616;
  --surface3: #1e1e1e;
  --surface4: #252525;
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(144,238,130,0.20);
  --text:    #ffffff;
  --text-muted: rgba(255,255,255,0.45);
  --text-dim: rgba(255,255,255,0.65);
  --shadow:  0 4px 24px rgba(0,0,0,0.6);
  --shadow-sm: 0 2px 10px rgba(0,0,0,0.4);

  /* Status colors — dark-native */
  --s-reg:   #4A90D9;
  --s-proc:  #F5921E;
  --s-qual:  #A78BFA;
  --s-pack:  #90EE82;
  --s-disp:  #34D399;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Nunito',sans-serif;
  font-size:14px;
  color:var(--text);
  background:var(--black);
  height:100vh;
  overflow:hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface4);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#333}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh}

/* ── Header ── */
.hdr{
  background:var(--black);
  border-bottom:1px solid var(--border);
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  flex-shrink:0;
  gap:12px;
  position:relative;
  z-index:10;
}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{
  display:flex;align-items:center;gap:6px;
  font-size:15px;font-weight:900;
  color:var(--mint);
  letter-spacing:-0.3px;
}
.hdr-logo svg{flex-shrink:0}
.hdr-divider{width:1px;height:20px;background:var(--border);margin:0 4px}
.hdr-product{
  font-size:11px;font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--text-muted);
}
.hdr-right{display:flex;align-items:center;gap:8px}
.org-pill{
  background:var(--surface3);
  border:1px solid var(--border);
  border-radius:6px;
  padding:5px 12px;
  font-size:12px;font-weight:700;
  cursor:pointer;color:var(--text-dim);
  white-space:nowrap;
  transition:all .15s;
}
.org-pill:hover{border-color:var(--mint);color:var(--mint)}
.org-pill strong{color:var(--mint)}

/* ── Body ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{
  width:200px;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:10px 0;
  flex-shrink:0;
  display:flex;flex-direction:column;
  gap:2px;
  overflow-y:auto;
}
.sb-label{
  font-size:10px;font-weight:800;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--text-muted);
  padding:10px 16px 5px;
  margin-top:4px;
}
.nb{
  display:flex;align-items:center;gap:9px;
  width:100%;padding:8px 16px;
  border:none;background:none;
  color:var(--text-dim);
  cursor:pointer;font-size:13px;font-weight:600;
  text-align:left;
  border-radius:0;
  transition:all .12s;
  font-family:'Nunito',sans-serif;
}
.nb:hover{background:var(--surface3);color:var(--text)}
.nb.active{
  background:var(--mint-glow);
  color:var(--mint);
  border-right:2px solid var(--mint);
}
.nb svg{flex-shrink:0;opacity:.6}
.nb.active svg{opacity:1}
.nb.active svg *{stroke:var(--mint)}

.sb-divider{border:none;border-top:1px solid var(--border);margin:6px 12px}

.action-nb{
  display:block;
  width:calc(100% - 24px);
  margin:3px 12px;
  padding:7px 12px;
  border-radius:6px;
  border:1px solid var(--border2);
  background:none;
  color:var(--mint);
  cursor:pointer;
  font-size:12px;font-weight:700;
  text-align:left;
  transition:all .12s;
  font-family:'Nunito',sans-serif;
}
.action-nb:hover,.action-nb.hi{
  background:var(--mint-glow);
  border-color:var(--mint);
}

/* ── Main ── */
.main{flex:1;overflow-y:auto;padding:20px}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px 18px;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
  transition:border-color .15s;
}
.sc:hover{border-color:var(--border2)}
.sc::before{
  content:'';
  position:absolute;top:0;left:0;right:0;
  height:2px;
  background:var(--mint);
}
.sc .n{font-size:28px;font-weight:900;color:var(--mint);line-height:1}
.sc .l{font-size:11px;font-weight:700;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* ── Card ── */
.card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  box-shadow:var(--shadow-sm);
  overflow:hidden;
  margin-bottom:20px;
}
.card-hdr{
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.card-hdr h2{font-size:13px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.8px}
.search{
  padding:6px 12px;
  border:1px solid var(--border);
  border-radius:6px;
  font-size:13px;
  width:210px;
  background:var(--surface3);
  color:var(--text);
  font-family:'Nunito',sans-serif;
  transition:border-color .15s;
}
.search:focus{outline:none;border-color:var(--mint)}
.search::placeholder{color:var(--text-muted)}

/* ── Table ── */
table{width:100%;border-collapse:collapse}
th{
  background:var(--surface3);
  padding:9px 16px;
  text-align:left;
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:1px;
  color:var(--text-muted);
  border-bottom:1px solid var(--border);
}
td{
  padding:11px 16px;
  border-bottom:1px solid var(--border);
  font-size:13px;
  font-weight:600;
  color:var(--text-dim);
}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface3);cursor:pointer;color:var(--text)}
.code{
  font-family:'Courier New',monospace;
  font-weight:700;
  color:var(--mint);
  font-size:12px;
  letter-spacing:.5px;
  background:var(--mint-glow2);
  padding:2px 6px;
  border-radius:4px;
  border:1px solid var(--border2);
}
.mix-code{color:var(--orange);background:rgba(245,146,30,0.08);border-color:rgba(245,146,30,0.25)}

/* ── Badges ── */
.badge{
  display:inline-block;
  padding:3px 9px;
  border-radius:20px;
  font-size:10px;font-weight:800;
  letter-spacing:.5px;
  text-transform:uppercase;
}
.b-reg{background:rgba(74,144,217,0.15);color:#6BAED6;border:1px solid rgba(74,144,217,0.3)}
.b-proc{background:rgba(245,146,30,0.15);color:var(--orange);border:1px solid rgba(245,146,30,0.3)}
.b-qual{background:rgba(167,139,250,0.15);color:#B39DDB;border:1px solid rgba(167,139,250,0.3)}
.b-pack{background:rgba(144,238,130,0.15);color:var(--mint);border:1px solid var(--border2)}
.b-disp{background:rgba(52,211,153,0.15);color:#34D399;border:1px solid rgba(52,211,153,0.3)}

/* ── Buttons ── */
.btn{
  padding:8px 18px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-size:13px;font-weight:700;
  transition:all .15s;
  font-family:'Nunito',sans-serif;
}
.btn-p{background:var(--mint);color:#000}.btn-p:hover{background:var(--mint-dim)}
.btn-s{
  background:var(--surface3);
  color:var(--text-dim);
  border:1px solid var(--border);
}.btn-s:hover{background:var(--surface4);color:var(--text)}
.btn-d{
  background:rgba(239,68,68,0.12);
  color:#F87171;
  border:1px solid rgba(239,68,68,0.3);
}.btn-d:hover{background:rgba(239,68,68,0.22)}
.btn-e{
  background:var(--mint-glow);
  color:var(--mint);
  border:1px solid var(--border2);
}.btn-e:hover{background:rgba(144,238,130,0.2)}
.btn-sm{padding:5px 12px;font-size:12px}
.iBtn{
  background:none;border:none;cursor:pointer;
  padding:4px 7px;border-radius:5px;
  color:var(--text-muted);font-size:14px;line-height:1;
  transition:all .12s;
}
.iBtn:hover{background:var(--surface4);color:var(--text)}

/* ── Form Card ── */
.fcard{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  box-shadow:var(--shadow);
  overflow:hidden;
  max-width:900px;
}
.fcard-hdr{
  background:var(--black);
  border-bottom:1px solid var(--border2);
  padding:20px 24px;
}
.fcard-hdr h2{
  font-size:16px;font-weight:900;
  color:var(--text);
  text-transform:uppercase;letter-spacing:.5px;
}
.fcard-hdr p{font-size:12px;color:var(--text-muted);margin-top:3px;font-weight:600}
.code-box{
  background:var(--mint-glow2);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:8px 16px;
  margin-top:14px;
  display:inline-flex;
  align-items:baseline;
  gap:12px;
}
.code-box .big{
  font-family:'Courier New',monospace;
  font-size:22px;font-weight:700;
  color:var(--mint);
  letter-spacing:2px;
}
.code-box .tiny{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}

/* ── Tabs ── */
.tabs{
  display:flex;
  background:var(--black);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
}
.tab{
  padding:12px 18px;
  font-size:12px;font-weight:700;
  cursor:pointer;border:none;background:none;
  color:var(--text-muted);
  border-bottom:2px solid transparent;
  white-space:nowrap;flex-shrink:0;
  transition:all .12s;
  font-family:'Nunito',sans-serif;
  text-transform:uppercase;letter-spacing:.5px;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--mint);border-bottom-color:var(--mint)}
.tab.done{color:var(--text-dim)}.tab.done::before{content:"✓ ";color:var(--mint)}

/* ── Form Body ── */
.fbody{padding:24px}
.frow{display:grid;gap:14px;margin-bottom:14px}
.f2{grid-template-columns:1fr 1fr}
.f3{grid-template-columns:1fr 1fr 1fr}
.f4{grid-template-columns:1fr 1fr 1fr 1fr}
.f1{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{
  font-size:10px;font-weight:800;
  color:var(--mint);
  text-transform:uppercase;letter-spacing:1px;
}
.fg input,.fg select,.fg textarea{
  padding:8px 12px;
  border:1px solid var(--border);
  border-radius:6px;
  font-size:13px;font-weight:600;
  color:var(--text);
  background:var(--surface3);
  transition:border-color .15s;
  font-family:'Nunito',sans-serif;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  outline:none;
  border-color:var(--mint);
  box-shadow:0 0 0 2px var(--mint-glow);
}
.fg select option{background:var(--surface3);color:var(--text)}
.fg input[readonly]{
  background:var(--surface);
  color:var(--mint);
  font-family:'Courier New',monospace;
  font-weight:700;
  font-size:13px;
  letter-spacing:1px;
  cursor:default;
}
.fg .hint{font-size:11px;color:var(--text-muted);font-weight:600}
.fg textarea{resize:vertical;min-height:72px}

/* ── Section head ── */
.sh{
  font-size:10px;font-weight:900;
  color:var(--mint);
  text-transform:uppercase;letter-spacing:1.5px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border2);
  margin-bottom:14px;
  margin-top:6px;
}

/* ── Variety rows ── */
.vrow{display:grid;grid-template-columns:1fr 110px 32px;gap:8px;align-items:end;margin-bottom:8px}
.add-btn{
  background:none;
  border:1px dashed var(--border2);
  border-radius:6px;
  padding:7px 12px;
  color:var(--mint);
  cursor:pointer;font-size:12px;font-weight:700;
  margin-top:4px;
  transition:all .12s;
  font-family:'Nunito',sans-serif;
}
.add-btn:hover{background:var(--mint-glow);border-style:solid}
.rm-btn{
  background:none;border:none;
  color:var(--text-muted);
  cursor:pointer;font-size:18px;
  padding:6px 2px;line-height:1;
  transition:color .12s;
}
.rm-btn:hover{color:#F87171}

/* ── Cut test table ── */
.ct-wrap{overflow-x:auto;margin-top:8px}
.ct{width:100%;border-collapse:collapse;font-size:12px}
.ct th{
  background:var(--surface3);
  padding:7px 10px;text-align:center;
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-muted);
  border:1px solid var(--border);
}
.ct th.left{text-align:left}
.ct td{
  padding:5px 5px;border:1px solid var(--border);
  text-align:center;vertical-align:middle;
}
.ct td.param{
  padding-left:10px;font-weight:700;
  color:var(--text-dim);text-align:left;
  background:var(--surface3);white-space:nowrap;
  border:1px solid var(--border);
}
.ct td.ref{
  font-size:10px;font-weight:700;
  color:var(--text-muted);
  background:var(--surface3);
  border:1px solid var(--border);
}
.ct input{
  width:64px;padding:4px 5px;
  border:1px solid var(--border);border-radius:4px;
  font-size:12px;font-weight:600;
  text-align:center;
  background:var(--surface4);
  color:var(--text);
  font-family:'Nunito',sans-serif;
}
.ct input:focus{outline:none;border-color:var(--mint)}
.ct .warn{border-color:#F87171!important;background:rgba(239,68,68,0.1)!important}

/* ── Mix rows ── */
.mrow{
  display:grid;grid-template-columns:1fr 110px 32px;
  gap:8px;align-items:end;margin-bottom:8px;
  padding:12px;
  background:var(--surface3);
  border:1px solid var(--border);
  border-radius:8px;
}
.pct-bar{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;font-weight:700}
.pct-ok{color:var(--mint)}
.pct-warn{color:var(--orange)}

/* ── Form footer ── */
.ffooter{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 24px;
  border-top:1px solid var(--border);
  background:var(--black);
}

/* ── Alerts ── */
.alert{
  padding:10px 14px;border-radius:6px;
  font-size:12px;font-weight:700;
  margin-bottom:16px;
}
.a-info{
  background:rgba(144,238,130,0.07);
  color:var(--text-dim);
  border-left:3px solid var(--mint);
}
.a-warn{
  background:rgba(245,146,30,0.1);
  color:var(--orange);
  border-left:3px solid var(--orange);
}

/* ── Empty state ── */
.empty{text-align:center;padding:50px 20px;color:var(--text-muted)}
.empty .ico{font-size:40px;margin-bottom:10px;opacity:.5}
.empty p{font-size:13px;font-weight:600;line-height:1.7}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;z-index:999;
  backdrop-filter:blur(3px);
}
.modal{
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:12px;padding:24px;
  width:440px;max-width:95vw;
  box-shadow:0 24px 80px rgba(0,0,0,.7);
}
.modal h3{
  font-size:15px;font-weight:900;
  margin-bottom:18px;color:var(--text);
  text-transform:uppercase;letter-spacing:.5px;
}
.modal .fg{margin-bottom:12px}
.mfooter{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}

/* ── Print ── */
@media print{
  .sidebar,.hdr,.ffooter,.tabs,.iBtn,.btn,.action-nb,.add-btn,.rm-btn,.search,.card-hdr .btn,.mrow-del,
  .no-print{display:none!important}
  body,html{height:auto;overflow:visible;background:#fff;color:#000}
  .main{padding:10px;background:#fff}
  .fcard{box-shadow:none;border-radius:0;max-width:100%;background:#fff;border:none}
  .fcard-hdr{background:#000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .fg label{color:#000}
  .fg input,.fg select,.fg textarea{background:#fff;color:#000;border-color:#ccc}
  .fg input[readonly]{background:#f5f5f5;color:#000}
  table th{background:#f0f0f0!important;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ct th{background:#f0f0f0!important;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .fbody{padding:12px 16px}
  .card{display:none}
  .stats{display:none}
  .fcard{display:block!important}
  td,th{color:#000;border-color:#ddd}
  .code{background:#f5f5f5;color:#000;border-color:#ccc}
  .sh{color:#000;border-color:#ccc}
  .badge{background:#eee;color:#000;border:1px solid #ccc}
}

/* ── Provnr Sync Panel ── */
.sync-panel{background:rgba(144,238,130,0.05);border:1px solid var(--border2);border-radius:8px;padding:14px 16px;margin-bottom:20px}
.sync-panel .sync-title{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--mint);margin-bottom:10px}
.sync-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sync-input{flex:1;min-width:180px;padding:7px 12px;border:1px solid var(--border2);border-radius:6px;background:var(--surface3);color:var(--text);font-size:13px;font-weight:600;font-family:'Nunito',sans-serif}
.sync-input:focus{outline:none;border-color:var(--mint)}
.sync-input::placeholder{color:var(--text-muted)}
.btn-sync{background:var(--mint);color:#000;border:none;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap}
.btn-sync:hover{background:var(--mint-dim)}
.btn-sync:disabled{opacity:.5;cursor:not-allowed}
.sync-status{font-size:12px;font-weight:700;margin-top:10px;padding:8px 12px;border-radius:6px;display:none}
.sync-ok{background:rgba(144,238,130,0.1);color:var(--mint);border-left:3px solid var(--mint)}
.sync-err{background:rgba(239,68,68,0.1);color:#F87171;border-left:3px solid #F87171}
.sync-field{color:var(--text-dim)}
.db-banner{background:rgba(144,238,130,0.07);border-bottom:1px solid var(--border2);padding:6px 20px;font-size:11px;font-weight:700;color:var(--text-muted);display:flex;align-items:center;gap:8px}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--mint);display:inline-block}
.db-dot.err{background:#F87171}


#printAllTabs { display: none; }
@media print {
  #printAllTabs { display: block !important; }
  .app, .hdr, .body { display: none !important; }
}

</style>
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <div class="hdr">
    <div class="hdr-brand">
      <!-- Leaf-in-circle wordmark approximation -->
      <div class="hdr-logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="10.5" stroke="#90EE82" stroke-width="1"/>
          <path d="M11 16c-3-2-5-5-3-8 1-1.5 3-2 5-1.5-.5 2-1 3.5 0 5 .5.8 1.2 1.5 2 2-1 .5-2.5 1.5-4 2.5z" fill="#5B7A3D"/>
          <path d="M11 16c1-2.5 3-4 4-6.5-.5 3-1 5-4 6.5z" fill="#90EE82"/>
        </svg>
        provnr

// ─── Persistence ──────────────────────────────────────────────────────────────
function persist() {
  // Settings always local
  localStorage.setItem('cacao_settings', JSON.stringify(S.settings));
  // Cache lots locally for offline fallback
  localStorage.setItem('cacao_lots', JSON.stringify(S.lots));
}

async function persistLot(lot) {
  if (!dbAvailable) {
    // Save to local cache only
    persist();
    return;
  }
  try {
    const { error } = await db.from('lots').upsert(lotToRow(lot), { onConflict: 'id' });
    if (error) throw error;
    persist(); // also update local cache
  } catch(e) {
    console.error('Supabase save error:', e.message);
    persist(); // fallback to local
  }
}

async function deleteLotRemote(id) {
  if (!dbAvailable) return;
  try { await db.from('lots').delete().eq('id', id); } catch(e) { console.error('Delete error:', e); }
}

async function loadData() {
  // Settings from localStorage
  try { const s = JSON.parse(localStorage.getItem('cacao_settings')); if(s) Object.assign(S.settings, s); } catch(e) {}
  document.getElementById('orgDisplay').textContent = S.settings.orgCode;

  // Load local cache immediately (includes mixes and offline lots)
  try {
    S.lots = JSON.parse(localStorage.getItem('cacao_lots') || '[]');
  } catch(e) { S.lots = []; }
  render();

  // Try to fetch from Supabase
  try {
    const { data, error } = await db.from('lots').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    // Merge: Supabase lots + local mixes (mixes are local-only)
    const localMixes = S.lots.filter(l => l.type === 'mix');
    S.lots = [...(data || []).map(rowToLot), ...localMixes];
    persist();
    setDbStatus(true, 'Conectado a Provnr ✓');
  } catch(e) {
    setDbStatus(false, 'Sin conexión — mostrando caché local');
    console.warn('Supabase load failed:', e.message);
  }
  render();
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function isoWeek(dateStr) {
  const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const start = new Date(jan4);
  start.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const diff = d - start;
  const wk = Math.floor(diff / 864e5 / 7) + 1;
  const yr = d.getFullYear();
  return { yr: String(yr).slice(2), wk: String(wk).padStart(2,'0') };
}
function nextSeq(prefix) {
  const existing = S.lots.filter(l => l.id.startsWith(prefix));
  const nums = existing.map(l => parseInt(l.id.split('-').pop()) || 0);
  return String(Math.max(0, ...nums) + 1).padStart(3,'0');
}
function genLotCode(dateStr) {
  const {yr, wk} = isoWeek(dateStr);
  const prefix = `${S.settings.orgCode}-${yr}-${wk}`;
  return `${prefix}-${nextSeq(prefix)}`;
}
function genMixCode(dateStr) {
  const {yr, wk} = isoWeek(dateStr || undefined);
  const prefix = `${S.settings.orgCode}-MIX-${yr}-${wk}`;
  return `${prefix}-${nextSeq(prefix)}`;
}
function daysBetween(a, b) {
  if (!a || !b) return '';
  const d = Math.round((new Date(b) - new Date(a)) / 864e5);
  return d >= 0 ? d : '';
}
function statusLabel(s) {
  const m = {registered:'Registrado',processing:'En proceso',quality:'Control calidad',packed:'Empacado',dispatched:'Despachado'};
  return m[s] || s;
}
function statusClass(s) {
  const m = {registered:'b-reg',processing:'b-proc',quality:'b-qual',packed:'b-pack',dispatched:'b-disp'};
  return m[s] || 'b-reg';
}
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today() { return new Date().toISOString().slice(0,10); }

function stepsDone(lot) {
  const done = [];
  if (lot.farmName || lot.harvestDate) done.push(0);
  if (lot.fermentStart || lot.fermentEnd || lot.dryStart || lot.dryEnd || lot.dryMethod || lot.fermentorType) done.push(1);
  if (lot.cutDate || (lot.cutRows && lot.cutRows.length)) done.push(2);
  if (lot.bagCount || lot.buyer) done.push(3);
  return done;
}

  if (tab === 0) return `

// ─── Variety helpers ──────────────────────────────────────────────────────────
function getVarsFromForm() {
  const vars = [];
  let i = 0;
  while (document.getElementById(`var-name-${i}`) !== null) {
    vars.push({ name: document.getElementById(`var-name-${i}`).value.trim(), pct: document.getElementById(`var-pct-${i}`).value });
    i++;
  }
  return vars;
}
function addVar() {
  const vars = getVarsFromForm();
  vars.push({name:'',pct:''});
  const idx = vars.length - 1;
  const row = document.createElement('div');
  row.className = 'vrow';
  row.innerHTML = `
    <div class="fg"><label>Variedad ${idx+1}</label><input id="var-name-${idx}" placeholder="ej. CCN-51"></div>
    <div class="fg"><label>% en mezcla</label><input type="number" id="var-pct-${idx}" min="0" max="100"></div>
    <button class="rm-btn" onclick="removeVar(${idx})">×</button>`;
  document.getElementById('varRows').appendChild(row);
}
function removeVar(i) {
  const vars = getVarsFromForm();
  if (vars.length <= 1) return;
  vars.splice(i,1);
  document.getElementById('varRows').innerHTML = vars.map((v,j)=>`<div class="vrow">
    <div class="fg"><label>Variedad ${j+1}</label><input id="var-name-${j}" value="${escH(v.name)}" placeholder="ej. Regional Criollo"></div>
    <div class="fg"><label>% en mezcla</label><input type="number" id="var-pct-${j}" min="0" max="100" value="${escH(v.pct)}"></div>
    <button class="rm-btn" onclick="removeVar(${j})" ${vars.length===1?'style="visibility:hidden"':''}>×</button>
  </div>`).join('');
}

// ─── Mix row helpers ──────────────────────────────────────────────────────────
function getMixRowsFromForm() {
  const rows = [];
  let i = 0;
  while (document.getElementById(`mix-lot-${i}`) !== null) {
    rows.push({ lotId: document.getElementById(`mix-lot-${i}`).value, pct: document.getElementById(`mix-pct-${i}`).value });
    i++;
  }
  return rows;
}
function addMixRow() {
  const rows = getMixRowsFromForm();
  const i = rows.length;
  const avail = S.lots.filter(l=>l.type==='lot');
  const div = document.createElement('div');
  div.className = 'mrow'; div.id = `mrow-${i}`;
  div.innerHTML = `
    <div class="fg"><label>Lote ${i+1}</label>
      <select id="mix-lot-${i}" onchange="recalcMixWeight()">
        <option value="">— Seleccionar lote —</option>
        ${avail.map(l=>`<option value="${l.id}">${l.id}${l.farmName?' · '+l.farmName:''}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><label>Porcentaje (%)</label><input type="number" min="0" max="100" id="mix-pct-${i}" oninput="recalcPct()"></div>
    <button class="rm-btn mrow-del" onclick="removeMixRow(${i})">×</button>`;
  document.getElementById('mixRows').appendChild(div);
}
function removeMixRow(i) {
  const rows = getMixRowsFromForm();
  if (rows.length <= 1) return;
  rows.splice(i,1);
  const avail = S.lots.filter(l=>l.type==='lot');
  document.getElementById('mixRows').innerHTML = rows.map((r,j)=>`<div class="mrow" id="mrow-${j}">
    <div class="fg"><label>Lote ${j+1}</label>
      <select id="mix-lot-${j}" onchange="recalcMixWeight()">
        <option value="">— Seleccionar lote —</option>
        ${avail.map(l=>`<option value="${l.id}" ${r.lotId===l.id?'selected':''}>${l.id}${l.farmName?' · '+l.farmName:''}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><label>Porcentaje (%)</label><input type="number" min="0" max="100" id="mix-pct-${j}" value="${escH(r.pct)}" oninput="recalcPct()"></div>
    <button class="rm-btn mrow-del" onclick="removeMixRow(${j})" ${rows.length===1?'style="visibility:hidden"':''}>×</button>
  </div>`).join('');
  recalcPct();
}
function recalcPct() {
  const rows = getMixRowsFromForm();
  const total = rows.reduce((s,r)=>s+(parseFloat(r.pct)||0),0);
  const el = document.getElementById('pctTotal');
  if (el) { el.textContent = total.toFixed(1)+'%'; el.className = Math.abs(total-100)<0.01?'pct-ok':'pct-warn'; }
  recalcMixWeight();
}
function recalcMixWeight() {
  const rows = getMixRowsFromForm();
  let total = 0;
  rows.forEach(r => {
    const lot = S.lots.find(l=>l.id===r.lotId);
    if (lot && lot.netWeight && r.pct) total += parseFloat(lot.netWeight) * parseFloat(r.pct) / 100;
  });
  const el = document.getElementById('mix-netWeight');
  if (el && total > 0) el.value = total.toFixed(1);
}

// ─── Code preview ─────────────────────────────────────────────────────────────
function updateCodePreview(dateStr) {
  const el = document.getElementById('f-lotCodePreview');
  const disp = document.getElementById('lotCodeDisplay');
  if (!el) return;
  if (!S.editId) {
    const {yr, wk} = isoWeek(dateStr);
    const prefix = `${S.settings.orgCode}-${yr}-${wk}`;
    const code = `${prefix}-${nextSeq(prefix)}`;
    el.value = code;
    if (disp) disp.textContent = code;
  }
}

// ─── Date calc helpers ────────────────────────────────────────────────────────
function calcDays(type) {
  const s = document.getElementById(`f-${type}Start`);
  const e = document.getElementById(`f-${type}End`);
  const d = document.getElementById(`f-${type}Days`);
  if (s && e && d) d.value = daysBetween(s.value, e.value);
}
function calcNetWeight() {
  const cnt = parseFloat(document.getElementById('f-bagCount')?.value||0);
  const wt = parseFloat(document.getElementById('f-bagWeight')?.value||0);
  const el = document.getElementById('f-packNetWeight');
  if (el && cnt && wt) el.value = (cnt * wt).toFixed(1);
}

// ─── Save Lot ─────────────────────────────────────────────────────────────────
function collectCutRows(varieties) {
  const paramKeys = ['wellFermented','partial','violet','moldy','germinated','insected','flat','grainIndex'];
  return varieties.map((_,vi) => {
    const obj = {};
    paramKeys.forEach(k => { const el = document.getElementById(`ct-v${vi}-${k}`); obj[k] = el ? el.value : ''; });
    return obj;
  });
}
function collectCutBlend() {
  const paramKeys = ['wellFermented','partial','violet','moldy','germinated','insected','flat','grainIndex'];
  const obj = {};
  paramKeys.forEach(k => { const el = document.getElementById(`ct-blend-${k}`); obj[k] = el ? el.value : ''; });
  return obj;
}
async function saveLotForm(existingId) {
  const harvestDate = document.getElementById('f-harvestDate')?.value;
  const vars = getVarsFromForm();
  let id;
  if (existingId) {
    id = existingId;
  } else {
    id = document.getElementById('f-lotCodePreview')?.value;
    if (!id || id === '—') id = genLotCode(harvestDate || today());
  }
  const existing = S.lots.find(l=>l.id===id);
  const base = existing || { id, type:'lot', createdAt: new Date().toISOString() };
  const updated = Object.assign({}, base, {
    harvestDate: document.getElementById('f-harvestDate')?.value || '',
    status: document.getElementById('f-status')?.value || 'registered',
    farmName: document.getElementById('f-farmName')?.value || '',
    municipality: document.getElementById('f-municipality')?.value || '',
    department: document.getElementById('f-department')?.value || '',
    altitude: document.getElementById('f-altitude')?.value || '',
    producer: document.getElementById('f-producer')?.value || '',
    technician0: document.getElementById('f-technician0')?.value || '',
    grossWeight: document.getElementById('f-grossWeight')?.value || '',
    netWeight: document.getElementById('f-netWeight')?.value || '',
    bagCountReg: document.getElementById('f-bagCountReg')?.value || '',
    varieties: vars,
    fermentStart: document.getElementById('f-fermentStart')?.value || '',
    fermentEnd: document.getElementById('f-fermentEnd')?.value || '',
    fermentDays: document.getElementById('f-fermentDays')?.value || '',
    turns: document.getElementById('f-turns')?.value || '',
    fermentorType: document.getElementById('f-fermentorType')?.value || '',
    fermentNotes: document.getElementById('f-fermentNotes')?.value || '',
    dryStart: document.getElementById('f-dryStart')?.value || '',
    dryEnd: document.getElementById('f-dryEnd')?.value || '',
    dryDays: document.getElementById('f-dryDays')?.value || '',
    finalMoisture: document.getElementById('f-finalMoisture')?.value || '',
    dryMethod: document.getElementById('f-dryMethod')?.value || '',
    dryNotes: document.getElementById('f-dryNotes')?.value || '',
    cutDate: document.getElementById('f-cutDate')?.value || '',
    cutTech: document.getElementById('f-cutTech')?.value || '',
    cutRows: collectCutRows(vars),
    cutBlend: collectCutBlend(),
    sensorNotes: document.getElementById('f-sensorNotes')?.value || '',
    bagCount: document.getElementById('f-bagCount')?.value || '',
    bagWeight: document.getElementById('f-bagWeight')?.value || '',
    packNetWeight: document.getElementById('f-packNetWeight')?.value || '',
    packType: document.getElementById('f-packType')?.value || '',
    buyer: document.getElementById('f-buyer')?.value || '',
    dispatchDate: document.getElementById('f-dispatchDate')?.value || '',
    transportRef: document.getElementById('f-transportRef')?.value || '',
    observations: document.getElementById('f-observations')?.value || '',
    updatedAt: new Date().toISOString(),
  });
  if (existing) { const idx = S.lots.indexOf(existing); S.lots[idx] = updated; }
  else S.lots.push(updated);
  await persistLot(updated);
  S.editId = id;
  S.view = 'edit-lot';
  render();
  const hdr = document.querySelector('.fcard-hdr h2');
  if (hdr) { const orig = hdr.textContent; hdr.textContent = '✓ Guardado'; setTimeout(()=>hdr.textContent=orig,1500); }
}

// ─── Save Mix ─────────────────────────────────────────────────────────────────
function saveMixForm(existingId) {
  const components = getMixRowsFromForm();
  const pctTotal = components.reduce((s,c)=>s+(parseFloat(c.pct)||0),0);
  if (Math.abs(pctTotal-100) > 0.5) {
    alert(`Los porcentajes suman ${pctTotal.toFixed(1)}%. Deben sumar exactamente 100%.`);
    return;
  }
  let id;
  if (existingId) { id = existingId; }
  else { id = genMixCode(); }
  const existing = S.lots.find(l=>l.id===id);
  const base = existing || { id, type:'mix', createdAt: new Date().toISOString() };
  const updated = Object.assign({}, base, {
    componentLots: components,
    netWeight: document.getElementById('mix-netWeight')?.value || '',
    bagCount: document.getElementById('mix-bagCount')?.value || '',
    status: document.getElementById('mix-status')?.value || 'registered',
    buyer: document.getElementById('mix-buyer')?.value || '',
    dispatchDate: document.getElementById('mix-dispatchDate')?.value || '',
    transportRef: document.getElementById('mix-transportRef')?.value || '',
    observations: document.getElementById('mix-observations')?.value || '',
    updatedAt: new Date().toISOString(),
  });
  if (existing) { const idx = S.lots.indexOf(existing); S.lots[idx] = updated; }
  else S.lots.push(updated);
  persist();
  S.editId = id;
  S.view = 'edit-mix';
  render();
}

// ─── Delete ───────────────────────────────────────────────────────────────────
function promptDelete(id) { S.deleteTarget = id; document.getElementById('deleteModal').style.display='flex'; }
async function confirmDelete() {
  const target = S.lots.find(l=>l.id===S.deleteTarget);
  S.lots = S.lots.filter(l=>l.id!==S.deleteTarget);
  persist();
  if (target?.type !== 'mix') await deleteLotRemote(S.deleteTarget);
  closeModal('deleteModal');
  navigate('dashboard');
}

// ─── CSV Export ───────────────────────────────────────────────────────────────
function exportCSV() {
  const cols = ['id','type','status','harvestDate','farmName','municipality','department','altitude','producer',
    'varieties','grossWeight','netWeight','bagCountReg',
    'fermentStart','fermentEnd','fermentDays','fermentorType','turns',
    'dryStart','dryEnd','dryDays','dryMethod','finalMoisture',
    'cutDate','cutTech','sensorNotes',
    'bagCount','bagWeight','packNetWeight','packType','buyer','dispatchDate','transportRef','observations',
    'componentLots','createdAt','updatedAt'];
  const rows = [cols.join(',')];
  S.lots.forEach(l => {
    rows.push(cols.map(c => {
      let v = l[c];
      if (c === 'varieties') v = (l.varieties||[]).map(x=>x.name+(x.pct?':'+x.pct+'%':'')).join('; ');
      if (c === 'componentLots') v = (l.componentLots||[]).map(x=>x.lotId+(x.pct?':'+x.pct+'%':'')).join('; ');
      return `"${String(v||'').replace(/"/g,'""')}"`;
    }).join(','));
  });
  const blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `fine_lots_${today()}.csv`;
  a.click();
}


// ─── Provnr sync (metadata backfill from photo_metadata) ─────────────────────
function syncSetStatus(msg, type) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.style.display = 'block';
  el.className = 'sync-status ' + (type === 'ok' ? 'sync-ok' : 'sync-err');
  el.innerHTML = msg;
}
function setField(id, value) {
  const el = document.getElementById(id);
  if (el && value !== null && value !== undefined && value !== '') {
    el.value = value;
    el.dispatchEvent(new Event('input'));
  }
}
function toDateStr(ts) { return ts ? new Date(ts).toISOString().slice(0,10) : null; }
function baseStep(step) { return (step||'').replace(/(_\d+)+$/, ''); }

async function syncFromProvnr() {
  const lotName = (document.getElementById('syncLotName')?.value || '').trim();
  if (!lotName) { syncSetStatus('Ingresa el nombre del lote.', 'err'); return; }
  const btn = document.getElementById('syncBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Buscando…'; }

  try {
    const { data: photos, error } = await db
      .from('photo_metadata')
      .select('step, timestamp, gps_latitude, gps_longitude, gps_altitude, user_id')
      .eq('session_name', lotName)
      .order('timestamp', { ascending: true });

    if (error) throw error;
    if (!photos || photos.length === 0) {
      syncSetStatus(`No se encontraron fotos para <strong>${lotName}</strong>.`, 'err');
      return;
    }

    const byStep = {};
    photos.forEach(p => { const k = baseStep(p.step); if (!byStep[k]) byStep[k] = p; });
    const filled = [];

    // Build patch object — write directly into the lot in memory, not the DOM
    // This way all fields are populated regardless of which tab is currently visible
    const patch = {};

    const harvestRow = byStep['receiving'] || byStep['harvest_collection'] || byStep['harvest_weight'];
    if (harvestRow?.timestamp) { patch.harvestDate = toDateStr(harvestRow.timestamp); filled.push('Fecha de cosecha'); }

    const f1 = byStep['ferment_1'];
    if (f1?.timestamp) { patch.fermentStart = toDateStr(f1.timestamp); filled.push('Inicio fermentación'); }
    const f2 = byStep['ferment_2'];
    if (f2?.timestamp) { patch.fermentEnd = toDateStr(f2.timestamp); filled.push('Fin fermentación'); }
    if (f1?.timestamp && f2?.timestamp) patch.fermentDays = String(Math.round((new Date(f2.timestamp)-new Date(f1.timestamp))/86400000));

    const d1 = byStep['drying_1'];
    if (d1?.timestamp) { patch.dryStart = toDateStr(d1.timestamp); filled.push('Inicio secado'); }
    const d2 = byStep['drying_2'];
    if (d2?.timestamp) { patch.dryEnd = toDateStr(d2.timestamp); filled.push('Fin secado'); }
    if (d1?.timestamp && d2?.timestamp) patch.dryDays = String(Math.round((new Date(d2.timestamp)-new Date(d1.timestamp))/86400000));

    const withAlt = photos.find(p => p.gps_altitude);
    if (withAlt?.gps_altitude) { patch.altitude = String(Math.round(withAlt.gps_altitude)); filled.push('Altitud'); }

    const cutPhotos = photos.filter(p => baseStep(p.step) === 'quality_check');
    if (cutPhotos[0]?.timestamp) { patch.cutDate = toDateStr(cutPhotos[0].timestamp); filled.push('Fecha prueba de corte'); }

    const userId = photos[0]?.user_id;
    if (userId) {
      const { data: profile } = await db.from('profiles').select('name,farm_name,association_name,user_type').eq('id', userId).single();
      if (profile) {
        const farm = profile.user_type === 'association' ? profile.association_name : profile.farm_name;
        if (farm) { patch.farmName = farm; filled.push('Finca'); }
        if (profile.name) { patch.producer = profile.name; filled.push('Productor'); }
      }
    }

    // Apply patch to existing lot in S.lots, or create a stub if editing a new lot
    const existingIdx = S.lots.findIndex(l => l.id === S.editId);
    if (existingIdx >= 0) {
      S.lots[existingIdx] = Object.assign({}, S.lots[existingIdx], patch);
    } else {
      // New lot — patch will be applied via setField on current tab fields
      // and re-render will populate other tabs when user navigates to them
      Object.keys(patch).forEach(k => {
        const fieldMap = {
          harvestDate: 'f-harvestDate', farmName: 'f-farmName', producer: 'f-producer',
          altitude: 'f-altitude', cutDate: 'f-cutDate',
          fermentStart: 'f-fermentStart', fermentEnd: 'f-fermentEnd', fermentDays: 'f-fermentDays',
          dryStart: 'f-dryStart', dryEnd: 'f-dryEnd', dryDays: 'f-dryDays',
        };
        if (fieldMap[k]) setField(fieldMap[k], patch[k]);
      });
      if (patch.harvestDate) updateCodePreview(patch.harvestDate);
    }

    // Re-render the form so all tabs reflect the patched data
    if (existingIdx >= 0) {
      const savedTab = S.tab;
      render();
      // Re-render restores tab to savedTab automatically
      // Show status after render
      setTimeout(() => syncSetStatus(
        `<strong>✓ ${photos.length} fotos encontradas.</strong> Completados: <span class="sync-field">${filled.join(' · ')}</span><br><span style="opacity:.6;font-size:11px">Revisa todas las pestañas y guarda el lote.</span>`,
        'ok'
      ), 50);
    } else {
      syncSetStatus(
        `<strong>✓ ${photos.length} fotos encontradas.</strong> Completados: <span class="sync-field">${filled.join(' · ')}</span><br><span style="opacity:.6;font-size:11px">Completa los campos restantes y guarda.</span>`,
        'ok'
      );
    }
  } catch(e) {
    syncSetStatus('Error: ' + e.message, 'err');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Sincronizar'; }
  }
}


// ─── Print all tabs ───────────────────────────────────────────────────────────
function printAllTabs(id) {
  const lot = S.lots.find(l => l.id === id);
  if (!lot) return;
  // Build a print-only div with all 4 tabs rendered
  const printDiv = document.createElement('div');
  printDiv.id = 'printAllTabs';
  printDiv.innerHTML = [0,1,2,3].map(i => `
    <div style="page-break-inside:avoid;margin-bottom:24px">
      <div style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:#666;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #ddd">
        ${['1. Registro','2. Fermentación & Secado','3. Prueba de Corte','4. Empaque'][i]}
      </div>
      ${renderTabForPrint(lot, i)}
    </div>
  `).join('');
  document.body.appendChild(printDiv);
  // Hide main content, show print div
  const main = document.getElementById('main');
  const origDisplay = main.style.display;
  main.style.display = 'none';
  window.print();
  // Restore
  main.style.display = origDisplay;
  document.body.removeChild(printDiv);
}

function renderTabForPrint(lot, tab) {
  // Save state, switch tab, render, restore
  const origTab = S.tab;
  const origEditId = S.editId;
  S.tab = tab;
  S.editId = lot.id;
  const html = renderTab(lot, tab);
  S.tab = origTab;
  S.editId = origEditId;
  return html;
}
